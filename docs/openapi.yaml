openapi: 3.0.3
info:
  title: Desafío Fullstack - User Management API
  description: API specification for the user management backend (Spring Boot 3.4.x). All endpoints operate under the base path `/api/users`.
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local development server
paths:
  /api/users:
    get:
      summary: Retrieve all users
      operationId: getAllUsers
      tags:
        - Users
      responses:
        "200":
          description: A list of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/UserResponse'
        "500":
          $ref: '#/components/responses/ServerError'
    post:
      summary: Create a new user
      operationId: createUser
      tags:
        - Users
      requestBody:
        description: User data to create
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        "201":
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "409":
          $ref: '#/components/responses/Conflict'
        "500":
          $ref: '#/components/responses/ServerError'
  /api/users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        description: Identifier of the user
        schema:
          type: integer
          format: int64
    get:
      summary: Retrieve a user by ID
      operationId: getUserById
      tags:
        - Users
      responses:
        "200":
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'
    put:
      summary: Update an existing user
      operationId: updateUser
      tags:
        - Users
      requestBody:
        description: Updated user data
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRequest'
      responses:
        "200":
          description: User updated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          $ref: '#/components/responses/BadRequest'
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'
    delete:
      summary: Delete a user by ID
      operationId: deleteUser
      tags:
        - Users
      responses:
        "204":
          description: User deleted successfully (no content)
        "404":
          $ref: '#/components/responses/NotFound'
        "500":
          $ref: '#/components/responses/ServerError'
components:
  schemas:
    UserRequest:
      type: object
      required:
        - nombres
        - apellidos
        - rut
        - dv
        - fechaNacimiento
        - correoElectronico
        - contrasena
      properties:
        nombres:
          type: string
          example: Juan Pablo
        apellidos:
          type: string
          example: Pérez González
        rut:
          type: integer
          format: int64
          example: 12345678
        dv:
          type: string
          example: "5"
        fechaNacimiento:
          type: string
          format: date
          example: 1990-05-15
        correoElectronico:
          type: string
          format: email
          example: juan.perez@example.com
        contrasena:
          type: string
          example: Secreta123*
    UserResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 1
        nombres:
          type: string
          example: Juan Pablo
        apellidos:
          type: string
          example: Pérez González
        rut:
          type: integer
          format: int64
          example: 12345678
        dv:
          type: string
          example: "5"
        fechaNacimiento:
          type: string
          format: date
          example: 1990-05-15
        correoElectronico:
          type: string
          format: email
          example: juan.perez@example.com
    ErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        path:
          type: string
  responses:
    BadRequest:
      description: Bad request – validation errors or malformed payload
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict – e.g., duplicate RUT
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'